services:
  db:
    image: postgres:16-alpine
    container_name: orderlink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderlink
      POSTGRES_PASSWORD: orderlink
      POSTGRES_DB: orderlink
    ports:
      - '5432:5432'
    volumes:
      - orderlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orderlink -d orderlink']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orderlink_pgdata:
