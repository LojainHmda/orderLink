<!-- Restaurant Profile & Settings - Customization Hub -->
<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OrderLink Admin - Profile & Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-surface": "#191c1d",
          "primary": "#006d2f",
          "primary-container": "#25d366",
          "surface": "#f8f9fa"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { background-color: #f8f9fa; }
  .glass-card {
    background: rgba(248, 249, 250, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(25, 28, 29, 0.12);
  }
</style>
</head>
<body class="font-body-md text-on-surface">
<!-- Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-screen w-[280px] bg-surface-container-low shadow-md hidden md:flex flex-col p-4 z-40">
  <div class="mb-6 flex items-center gap-3">
    <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
      <span class="material-symbols-outlined">restaurant</span>
    </div>
    <div>
      <h1 class="font-headline-md text-headline-md font-bold">OrderLink Admin</h1>
      <p class="font-label-md text-label-md text-secondary">Settings</p>
    </div>
  </div>
</aside>

<!-- Top Navigation -->
<header class="fixed top-0 w-full md:w-[calc(100%-280px)] md:left-[280px] z-30 flex justify-between items-center px-4 md:px-12 h-16 bg-surface border-b border-outline-variant shadow-sm">
  <h2 class="font-headline-sm text-headline-sm">Profile & Settings</h2>
</header>

<!-- Main Content -->
<main class="md:ml-[280px] min-h-screen pb-12 pt-24">
  <div class="max-w-4xl mx-auto px-4 md:px-12">

    <!-- Profile Section -->
    <section class="mb-8">
      <h3 class="font-headline-sm text-headline-sm mb-6">Restaurant Information</h3>
      <div class="glass-card rounded-xl p-8">
        <div class="flex gap-8 flex-col md:flex-row">
          <!-- Logo Upload -->
          <div>
            <label class="w-24 h-24 border-2 border-dashed border-primary-container rounded-lg flex items-center justify-center cursor-pointer hover:bg-primary-container/5 transition-colors group">
              <span class="material-symbols-outlined text-primary text-4xl group-hover:scale-110 transition-transform">photo_camera</span>
              <input type="file" class="hidden"/>
            </label>
            <p class="text-center text-label-sm text-secondary mt-3">Upload Logo</p>
          </div>

          <!-- Restaurant Details -->
          <div class="flex-1">
            <div class="mb-6">
              <label class="block font-label-lg mb-2 text-on-surface">Restaurant Name</label>
              <input type="text" placeholder="Green Olive Bistro" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:border-primary font-body-md"/>
            </div>
            <div class="mb-6">
              <label class="block font-label-lg mb-2 text-on-surface">Cuisine Type</label>
              <select class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:border-primary font-body-md">
                <option>Italian</option>
                <option>Asian Fusion</option>
                <option>American</option>
              </select>
            </div>
            <div class="mb-6">
              <label class="block font-label-lg mb-2 text-on-surface">Description</label>
              <textarea placeholder="Tell your customers about your restaurant..." class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface focus:outline-none focus:border-primary font-body-md resize-none" rows="4"></textarea>
            </div>
          </div>
        </div>
        <button class="mt-8 bg-primary text-on-primary font-label-lg px-8 py-3 rounded-lg hover:shadow-lg active:scale-95 transition-all">Save Changes</button>
      </div>
    </section>

    <!-- Operating Hours -->
    <section class="mb-8">
      <h3 class="font-headline-sm text-headline-sm mb-6">Operating Hours</h3>
      <div class="glass-card rounded-xl p-8 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block font-label-lg text-on-surface mb-2">Monday</label>
            <div class="flex gap-2 items-center">
              <input type="time" value="09:00" class="flex-1 px-3 py-2 border border-outline-variant rounded-lg font-body-md"/>
              <span class="text-secondary">to</span>
              <input type="time" value="22:00" class="flex-1 px-3 py-2 border border-outline-variant rounded-lg font-body-md"/>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Payment Settings -->
    <section class="mb-8">
      <h3 class="font-headline-sm text-headline-sm mb-6">Payment Methods</h3>
      <div class="glass-card rounded-xl p-8">
        <div class="space-y-3">
          <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-surface-container-low rounded-lg">
            <input type="checkbox" checked class="w-5 h-5 rounded accent-primary"/>
            <span class="font-body-md">Credit/Debit Card</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-surface-container-low rounded-lg">
            <input type="checkbox" checked class="w-5 h-5 rounded accent-primary"/>
            <span class="font-body-md">Digital Wallets</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer p-3 hover:bg-surface-container-low rounded-lg">
            <input type="checkbox" class="w-5 h-5 rounded accent-primary"/>
            <span class="font-body-md">Bank Transfer</span>
          </label>
        </div>
      </div>
    </section>

  </div>
</main>
</body>
</html>
