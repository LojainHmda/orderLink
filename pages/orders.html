<!-- Order Management - Live Feed -->
<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OrderLink Admin - Order Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-surface": "#191c1d",
          "primary": "#006d2f",
          "primary-container": "#25d366",
          "surface": "#f8f9fa"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { background-color: #f8f9fa; }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
    50% { box-shadow: 0 0 20px 4px rgba(37, 211, 102, 0.2); }
  }
  .animate-new-order { animation: pulse-glow 2s infinite ease-in-out; }
</style>
</head>
<body class="font-body-md text-on-surface">
<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-screen w-[280px] bg-surface-container-low shadow-md hidden md:flex flex-col p-4 z-40">
  <div class="mb-6 flex items-center gap-3">
    <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
      <span class="material-symbols-outlined">restaurant</span>
    </div>
    <div>
      <h1 class="font-headline-md text-headline-md font-bold">OrderLink Admin</h1>
      <p class="font-label-md text-label-md text-secondary">Orders</p>
    </div>
  </div>
</aside>

<!-- Main Content -->
<main class="md:ml-[280px] min-h-screen pb-20 md:pb-0">
  <header class="fixed top-0 w-full md:w-[calc(100%-280px)] z-30 flex justify-between items-center px-4 md:px-12 h-16 bg-surface border-b border-outline-variant shadow-sm">
    <h2 class="font-headline-sm text-headline-sm">Orders</h2>
  </header>

  <section class="pt-24 px-4 md:px-12">
    <h2 class="font-headline-sm mb-6">Latest Orders</h2>
    <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
      <!-- New Order Card -->
      <div class="bg-surface-container-lowest border-2 border-primary-container rounded-xl shadow-md overflow-hidden animate-new-order p-5 relative">
        <div class="absolute top-0 right-0 bg-primary-container text-on-primary-container font-label-sm px-3 py-1 rounded-bl-lg">NEW</div>
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="font-headline-sm">Order #1042</h3>
            <div class="flex items-center gap-2 mt-1">
              <span class="font-body-md font-semibold">John Doe</span>
            </div>
          </div>
          <span class="bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant text-label-md">Delivery</span>
        </div>
        <div class="space-y-2 mb-4">
          <div class="flex justify-between">
            <span class="text-secondary"><span class="font-bold">2x</span> Classic Burger</span>
          </div>
          <div class="flex justify-between">
            <span class="text-secondary"><span class="font-bold">1x</span> Truffle Fries</span>
          </div>
        </div>
        <div class="flex justify-between items-center pt-4 border-t border-outline-variant">
          <div>
            <p class="font-label-sm text-secondary uppercase">Total</p>
            <p class="font-headline-sm">$28.50</p>
          </div>
          <p class="font-label-sm text-error flex items-center gap-1">
            <span class="material-symbols-outlined text-[14px]">schedule</span>
            5 mins ago
          </p>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-6">
          <button class="bg-primary-container text-on-primary-container font-label-lg py-3 rounded-lg hover:shadow-lg active:scale-95 transition-all">Accept</button>
          <button class="bg-surface-container-high text-secondary font-label-lg py-3 rounded-lg hover:bg-error-container transition-all">Reject</button>
        </div>
      </div>

      <!-- Standard Order Card -->
      <div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-5 hover:shadow-md transition-shadow">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="font-headline-sm">Order #1041</h3>
            <span class="font-body-md font-semibold">Sarah Smith</span>
          </div>
          <span class="bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant">Pickup</span>
        </div>
        <div class="space-y-2 mb-4">
          <div><span class="text-secondary"><span class="font-bold">1x</span> Avocado Salad</span></div>
          <div><span class="text-secondary"><span class="font-bold">2x</span> Mango Smoothie</span></div>
        </div>
        <div class="flex justify-between pt-4 border-t border-outline-variant">
          <div>
            <p class="font-label-sm text-secondary uppercase">Total</p>
            <p class="font-headline-sm">$32.00</p>
          </div>
          <p class="font-label-sm text-secondary">12 mins ago</p>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
