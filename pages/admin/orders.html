<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orders · OrderLink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../../assets/js/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="../../assets/css/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface">
<aside id="ol-sidebar"></aside>
<header id="ol-topbar"></header>

<main class="md:ml-[280px] pt-24 pb-28 md:pb-12 px-container-margin-mobile md:px-container-margin-desktop min-h-screen">

  <!-- KPI row -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
      <p class="font-label-md text-secondary">Live orders</p>
      <p id="kpiLive" class="font-headline-md text-headline-md">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
      <p class="font-label-md text-secondary">Orders today</p>
      <p id="kpiToday" class="font-headline-md text-headline-md">0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
      <p class="font-label-md text-secondary">Revenue today</p>
      <p id="kpiRevenue" class="font-headline-md text-headline-md">$0</p>
    </div>
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
      <div class="flex items-center gap-2"><span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span><p class="font-label-md text-secondary">Kitchen</p></div>
      <p class="font-headline-md text-headline-md">Live</p>
    </div>
  </div>

  <!-- Lanes -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
    <div data-lane="new"></div>
    <div data-lane="preparing"></div>
    <div data-lane="ready"></div>
    <div data-lane="completed"></div>
  </div>
</main>

<nav id="ol-bottomnav"></nav>

<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/ui.js"></script>
<script>
(function () {
  var ui = OL.ui;
  var slug = OL.activeRestaurant().slug;
  ui.mountAdminShell({ base: "../../", active: "orders", title: "Orders" });

  var r = OL.getRestaurant(slug);
  var seen = {};   // track which order ids we've already rendered (for "new" glow)

  var LANES = [
    { key: "new",       title: "Requested", icon: "notifications_active", accent: "tertiary" },
    { key: "preparing", title: "Preparing", icon: "skillet",              accent: "tertiary" },
    { key: "ready",     title: "Ready",     icon: "check_circle",         accent: "primary" },
    { key: "completed", title: "Completed", icon: "task_alt",             accent: "secondary" }
  ];

  // Action buttons per status
  function actions(o) {
    if (o.status === "new") {
      return '<div class="grid grid-cols-2 gap-2 mt-4">' +
        '<button data-advance="' + o.id + '" class="bg-primary text-on-primary py-2.5 rounded-lg font-label-lg active:scale-95 transition-all">Accept</button>' +
        '<button data-reject="' + o.id + '" class="bg-surface-container-high text-secondary py-2.5 rounded-lg font-label-lg hover:bg-error-container hover:text-on-error-container transition-all">Reject</button>' +
        '</div>';
    }
    if (o.status === "preparing") {
      return '<button data-advance="' + o.id + '" class="w-full mt-4 bg-primary text-on-primary py-2.5 rounded-lg font-label-lg flex items-center justify-center gap-2 active:scale-95 transition-all"><span class="material-symbols-outlined text-[20px]">check_circle</span>Mark ready</button>';
    }
    if (o.status === "ready") {
      var label = o.type === "delivery" ? "Mark delivered" : "Complete order";
      return '<button data-advance="' + o.id + '" class="w-full mt-4 bg-primary text-on-primary py-2.5 rounded-lg font-label-lg flex items-center justify-center gap-2 active:scale-95 transition-all"><span class="material-symbols-outlined text-[20px]">task_alt</span>' + label + '</button>';
    }
    return '<div class="mt-4 flex items-center gap-2 text-secondary text-label-md"><span class="material-symbols-outlined text-[18px]">check</span>Completed ' + OL.timeAgo(o.updatedAt) + '</div>';
  }

  function typePill(o) {
    var map = { delivery: ["delivery_dining", "Delivery"], pickup: ["storefront", "Pickup"], "dine-in": ["restaurant", "Dine-in"] };
    var t = map[o.type] || map.delivery;
    return '<span class="inline-flex items-center gap-1 bg-surface-container-high text-on-surface-variant text-label-md px-2.5 py-1 rounded-full border border-outline-variant">' +
      '<span class="material-symbols-outlined text-[15px]">' + t[0] + '</span>' + t[1] + (o.table ? " · T" + o.table : "") + '</span>';
  }

  function card(o, isNew) {
    var channelTag = o.channel === "pos"
      ? '<span class="inline-flex items-center gap-1 text-label-sm text-tertiary"><span class="material-symbols-outlined text-[14px]">point_of_sale</span>POS</span>'
      : '<span class="inline-flex items-center gap-1 text-label-sm text-secondary"><span class="material-symbols-outlined text-[14px]">smartphone</span>Online</span>';
    var glow = (o.status === "new" && isNew) ? " animate-new-order" : "";
    return '<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm' + glow + '">' +
      '<div class="flex justify-between items-start mb-2">' +
        '<div><div class="flex items-center gap-2"><h3 class="font-headline-sm text-headline-sm">#' + o.code + '</h3>' + channelTag + '</div>' +
        '<p class="font-label-lg text-on-surface mt-0.5">' + OL.escapeHtml(o.customer.name) + '</p></div>' +
        typePill(o) +
      '</div>' +
      '<div class="space-y-1 mb-2">' + o.items.map(function (it) {
        return '<div class="flex justify-between text-body-sm"><span class="text-on-surface"><span class="font-bold">' + it.qty + '×</span> ' + OL.escapeHtml(it.name) +
          (it.note ? ' <span class="text-tertiary italic">(' + OL.escapeHtml(it.note) + ')</span>' : '') + '</span></div>';
      }).join("") + '</div>' +
      (o.note ? '<div class="bg-tertiary-fixed/40 border border-dashed border-tertiary/30 rounded-lg px-3 py-2 mb-2"><p class="text-label-md text-on-surface italic">"' + OL.escapeHtml(o.note) + '"</p></div>' : '') +
      '<div class="flex justify-between items-center pt-2 border-t border-outline-variant">' +
        '<p class="font-headline-sm text-headline-sm">' + OL.money(o.total, r) + '</p>' +
        '<p class="text-label-md text-secondary flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>' + OL.timeAgo(o.createdAt) + '</p>' +
      '</div>' +
      actions(o) +
    '</div>';
  }

  function laneHeader(lane, n) {
    return '<div class="flex items-center justify-between mb-3 px-1">' +
      '<div class="flex items-center gap-2"><span class="material-symbols-outlined text-on-surface-variant">' + lane.icon + '</span>' +
      '<h2 class="font-label-lg text-label-lg text-on-surface">' + lane.title + '</h2></div>' +
      '<span class="bg-surface-container-high text-on-surface-variant font-label-md px-2.5 py-0.5 rounded-full">' + n + '</span></div>';
  }

  function render() {
    var s = OL.stats(slug);
    document.getElementById("kpiLive").textContent = s.liveOrders;
    document.getElementById("kpiToday").textContent = s.ordersToday;
    document.getElementById("kpiRevenue").textContent = OL.money(s.revenueToday, r);

    LANES.forEach(function (lane) {
      var host = document.querySelector('[data-lane="' + lane.key + '"]');
      var list = OL.listOrders(slug, { status: lane.key });
      // For "completed" lane, show only today's, newest first, capped.
      if (lane.key === "completed") list = list.slice(0, 12);
      var cards = list.map(function (o) {
        var isNew = !seen[o.id];
        return card(o, isNew);
      }).join("");
      host.innerHTML = laneHeader(lane, list.length) +
        '<div class="ol-lane space-y-3 bg-surface-container-low/40 rounded-xl p-2 min-h-[120px]">' +
          (list.length ? cards : '<p class="text-center text-secondary text-body-sm py-8">No orders</p>') +
        '</div>';
    });

    // mark all as seen after first paint of each
    OL.listOrders(slug).forEach(function (o) { seen[o.id] = true; });
  }

  document.querySelector("main").addEventListener("click", function (e) {
    var adv = e.target.closest("[data-advance]");
    var rej = e.target.closest("[data-reject]");
    if (adv) {
      var o = OL.advanceOrder(adv.getAttribute("data-advance"));
      if (o) ui.toast("Order #" + o.code + " → " + OL.STATUS_META[o.status].label, { tone: "success" });
    }
    if (rej) {
      var id = rej.getAttribute("data-reject");
      ui.confirm({ title: "Reject order?", message: "The customer will see this order was declined.", confirmText: "Reject", icon: "block" })
        .then(function (ok) { if (ok) { OL.rejectOrder(id); ui.toast("Order rejected"); } });
    }
  });

  OL.subscribe(render);
  render();
  // keep relative timestamps fresh
  setInterval(render, 30000);
})();
</script>
</body>
</html>
