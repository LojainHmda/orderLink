<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
<title>Menu · OrderLink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../../assets/js/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="../../assets/css/styles.css" rel="stylesheet"/>
</head>
<body class="font-body-md text-on-surface bg-surface">

<!-- Not found state -->
<div id="notFound" class="hidden min-h-screen flex flex-col items-center justify-center text-center px-6">
  <div class="text-6xl mb-4">🔍</div>
  <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Menu not found</h1>
  <p class="text-body-md text-secondary max-w-xs">This ordering link looks invalid or has expired. Please ask the restaurant for an updated link.</p>
</div>

<!-- App -->
<div id="app" class="hidden max-w-2xl mx-auto">
  <!-- Header -->
  <header class="bg-primary-container text-on-primary-container">
    <div class="px-4 pt-5 pb-4 flex items-start justify-between">
      <div class="flex items-center gap-3">
        <div id="rEmoji" class="w-14 h-14 rounded-2xl bg-white/25 flex items-center justify-center text-3xl"></div>
        <div>
          <h1 id="rName" class="font-headline-md text-headline-md font-bold"></h1>
          <p id="rTagline" class="text-body-sm opacity-80"></p>
          <div id="tableTag" class="hidden mt-1"><span class="bg-white/25 text-[11px] px-2 py-0.5 rounded-full font-bold">Table <span id="tableNo"></span></span></div>
        </div>
      </div>
    </div>
    <div class="px-4 pb-4 flex flex-wrap gap-2 text-[12px]">
      <span class="bg-white/20 px-2.5 py-1 rounded-full flex items-center gap-1"><span class="material-symbols-outlined text-[15px]">schedule</span>15–25 min</span>
      <span id="feeTag" class="bg-white/20 px-2.5 py-1 rounded-full flex items-center gap-1"><span class="material-symbols-outlined text-[15px]">delivery_dining</span></span>
      <span id="addrTag" class="bg-white/20 px-2.5 py-1 rounded-full flex items-center gap-1"><span class="material-symbols-outlined text-[15px]">location_on</span></span>
    </div>
  </header>

  <!-- Category tabs (sticky) -->
  <div id="tabBar" class="sticky top-0 z-20 bg-surface/95 backdrop-blur border-b border-outline-variant no-scrollbar overflow-x-auto">
    <div id="tabs" class="flex gap-2 px-4 py-3 w-max"></div>
  </div>

  <!-- Menu -->
  <main id="menu" class="px-4 py-5 pb-40 space-y-8"></main>
</div>

<!-- Floating cart bar -->
<button id="cartBar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-30 w-[92%] max-w-md bg-primary text-on-primary rounded-2xl shadow-xl px-5 py-3.5 flex items-center justify-between active:scale-[0.98] transition-transform">
  <span class="flex items-center gap-2 font-label-lg">
    <span class="relative material-symbols-outlined">shopping_cart
      <span id="cartCount" class="absolute -top-2 -right-2 bg-on-primary text-primary text-[10px] min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center font-bold">0</span>
    </span>
    View order
  </span>
  <span id="cartTotal" class="font-headline-sm">$0.00</span>
</button>

<!-- Cart sheet -->
<div id="cartOverlay" class="hidden fixed inset-0 z-40 bg-black/40"></div>
<div id="cartSheet" class="ol-sheet fixed bottom-0 left-0 right-0 z-50 max-w-2xl mx-auto bg-surface rounded-t-3xl shadow-2xl max-h-[92vh] flex flex-col">
  <div class="px-5 py-4 border-b border-outline-variant flex items-center justify-between shrink-0">
    <h2 class="font-headline-sm text-headline-sm">Your order</h2>
    <button id="closeCart" class="p-2 -mr-2 hover:bg-surface-container-high rounded-full"><span class="material-symbols-outlined">close</span></button>
  </div>

  <div class="overflow-y-auto px-5 py-4 space-y-4 flex-1">
    <div id="cartItems" class="space-y-2"></div>
    <p id="cartEmpty" class="text-center text-secondary py-8">Your cart is empty.</p>

    <!-- Order type -->
    <div>
      <p class="font-label-lg text-label-lg mb-2">Order type</p>
      <div id="typeToggle" class="grid grid-cols-3 gap-2">
        <button data-type="delivery" class="ol-type px-3 py-2.5 rounded-xl border text-label-md flex flex-col items-center gap-1"><span class="material-symbols-outlined">delivery_dining</span>Delivery</button>
        <button data-type="pickup" class="ol-type px-3 py-2.5 rounded-xl border text-label-md flex flex-col items-center gap-1"><span class="material-symbols-outlined">storefront</span>Pickup</button>
        <button data-type="dine-in" class="ol-type px-3 py-2.5 rounded-xl border text-label-md flex flex-col items-center gap-1"><span class="material-symbols-outlined">restaurant</span>Dine-in</button>
      </div>
    </div>

    <!-- Customer details -->
    <div class="space-y-2">
      <input id="custName" placeholder="Your name" class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 focus:ring-primary focus:border-primary"/>
      <input id="custPhone" inputmode="tel" placeholder="WhatsApp number (optional)" class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 focus:ring-primary focus:border-primary"/>
      <textarea id="orderNote" rows="2" placeholder="Notes for the kitchen (allergies, address…)" class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 focus:ring-primary focus:border-primary resize-none"></textarea>
    </div>
  </div>

  <!-- Totals + submit -->
  <div class="px-5 py-4 border-t border-outline-variant space-y-2 shrink-0 bg-surface">
    <div class="flex justify-between text-body-md text-secondary"><span>Subtotal</span><span id="sumSubtotal">$0.00</span></div>
    <div id="feeRow" class="flex justify-between text-body-md text-secondary"><span>Delivery</span><span id="sumFee">$0.00</span></div>
    <div class="flex justify-between font-headline-sm text-headline-sm pt-1"><span>Total</span><span id="sumTotal">$0.00</span></div>
    <p id="minNote" class="hidden text-label-md text-error"></p>
    <button id="placeOrder" class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-3.5 rounded-2xl flex items-center justify-center gap-2 hover:shadow-lg active:scale-[0.98] transition-all disabled:opacity-50 disabled:active:scale-100">
      <span class="material-symbols-outlined">send</span>Place order
    </button>
  </div>
</div>

<script src="../../assets/js/store.js"></script>
<script src="../../assets/js/ui.js"></script>
<script>
(function () {
  var ui = OL.ui;
  var params = new URLSearchParams(location.search);
  var slug = params.get("r") || OL.activeRestaurant().slug;
  var table = params.get("table");
  var r = OL.getRestaurant(slug);

  if (!r) { document.getElementById("notFound").classList.remove("hidden"); return; }
  document.getElementById("app").classList.remove("hidden");

  // ---- Header ----
  document.title = r.name + " · Menu";
  document.getElementById("rEmoji").textContent = r.emoji || "🍽️";
  document.getElementById("rName").textContent = r.name;
  document.getElementById("rTagline").textContent = r.tagline || r.cuisine || "";
  document.getElementById("feeTag").innerHTML = '<span class="material-symbols-outlined text-[15px]">delivery_dining</span>' + (r.deliveryFee ? OL.money(r.deliveryFee, r) + " delivery" : "Free delivery");
  document.getElementById("addrTag").innerHTML = '<span class="material-symbols-outlined text-[15px]">location_on</span>' + OL.escapeHtml(r.address || "");
  if (table) {
    document.getElementById("tableTag").classList.remove("hidden");
    document.getElementById("tableNo").textContent = table;
  }

  // ---- Cart state ----
  var cart = [];                 // [{ id, name, emoji, price, qty, note }]
  var orderType = table ? "dine-in" : "delivery";

  function find(id) { return cart.find(function (c) { return c.id === id; }); }
  function add(item) {
    var ex = find(item.id);
    if (ex) ex.qty++;
    else cart.push({ id: item.id, name: item.name, emoji: item.emoji, price: item.price, qty: 1, note: "" });
    renderCart(); bumpBar();
  }
  function changeQty(id, delta) {
    var c = find(id); if (!c) return;
    c.qty += delta;
    if (c.qty <= 0) cart = cart.filter(function (x) { return x.id !== id; });
    renderCart();
  }

  // ---- Render menu ----
  var groups = OL.menuByCategory(slug, { onlyAvailable: true });
  var tabs = document.getElementById("tabs");
  var menuHost = document.getElementById("menu");

  tabs.innerHTML = groups.map(function (g, i) {
    return '<button data-tab="' + i + '" class="ol-tab whitespace-nowrap px-4 py-2 rounded-full font-label-lg text-label-lg ' +
      (i === 0 ? "bg-on-surface text-surface" : "bg-surface-container-high text-on-surface") + '">' + OL.escapeHtml(g.category) + '</button>';
  }).join("");

  menuHost.innerHTML = groups.map(function (g, i) {
    return '<section id="cat-' + i + '" data-cat="' + i + '">' +
      '<h2 class="font-headline-sm text-headline-sm mb-3">' + OL.escapeHtml(g.category) + '</h2>' +
      '<div class="space-y-3">' + g.items.map(function (m) {
        return '<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-3 flex gap-3 items-center">' +
          '<div class="w-16 h-16 rounded-xl bg-primary-container/15 flex items-center justify-center text-3xl shrink-0">' + (m.emoji || "🍽️") + '</div>' +
          '<div class="flex-1 min-w-0">' +
            '<h3 class="font-label-lg text-label-lg text-on-surface">' + OL.escapeHtml(m.name) + '</h3>' +
            '<p class="text-body-sm text-secondary line-clamp-2">' + OL.escapeHtml(m.description || "") + '</p>' +
            '<p class="font-headline-sm text-headline-sm mt-1">' + OL.money(m.price, r) + '</p>' +
          '</div>' +
          '<button data-add="' + m.id + '" class="self-end bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center shadow active:scale-90 transition-transform shrink-0"><span class="material-symbols-outlined">add</span></button>' +
        '</div>';
      }).join("") + '</div></section>';
  }).join("");

  // menu item -> add
  var byId = {};
  groups.forEach(function (g) { g.items.forEach(function (m) { byId[m.id] = m; }); });
  menuHost.addEventListener("click", function (e) {
    var a = e.target.closest("[data-add]");
    if (a) { add(byId[a.getAttribute("data-add")]); ui.toast("Added", { tone: "success", duration: 1100 }); }
  });

  // tabs: scroll + active
  tabs.addEventListener("click", function (e) {
    var t = e.target.closest("[data-tab]"); if (!t) return;
    var sec = document.getElementById("cat-" + t.getAttribute("data-tab"));
    if (sec) window.scrollTo({ top: sec.offsetTop - 60, behavior: "smooth" });
  });
  var sections = groups.map(function (g, i) { return document.getElementById("cat-" + i); });
  window.addEventListener("scroll", function () {
    var pos = window.scrollY + 80, active = 0;
    sections.forEach(function (s, i) { if (s && s.offsetTop <= pos) active = i; });
    document.querySelectorAll(".ol-tab").forEach(function (b, i) {
      var on = i === active;
      b.className = "ol-tab whitespace-nowrap px-4 py-2 rounded-full font-label-lg text-label-lg " +
        (on ? "bg-on-surface text-surface" : "bg-surface-container-high text-on-surface");
    });
  }, { passive: true });

  // ---- Cart UI ----
  var sheet = document.getElementById("cartSheet");
  var overlay = document.getElementById("cartOverlay");
  function openCart() { overlay.classList.remove("hidden"); sheet.classList.add("open"); }
  function closeCart() { overlay.classList.add("hidden"); sheet.classList.remove("open"); }
  document.getElementById("cartBar").addEventListener("click", openCart);
  document.getElementById("closeCart").addEventListener("click", closeCart);
  overlay.addEventListener("click", closeCart);

  function totals() {
    var subtotal = cart.reduce(function (s, c) { return s + c.price * c.qty; }, 0);
    var fee = orderType === "delivery" ? (r.deliveryFee || 0) : 0;
    return { subtotal: subtotal, fee: fee, total: subtotal + fee };
  }
  function count() { return cart.reduce(function (s, c) { return s + c.qty; }, 0); }

  function bumpBar() {
    var bar = document.getElementById("cartBar");
    bar.classList.toggle("hidden", count() === 0);
    document.getElementById("cartCount").textContent = count();
    document.getElementById("cartTotal").textContent = OL.money(totals().total, r);
  }

  function renderCart() {
    bumpBar();
    var t = totals();
    document.getElementById("cartEmpty").classList.toggle("hidden", cart.length > 0);
    document.getElementById("cartItems").innerHTML = cart.map(function (c) {
      return '<div class="flex items-center gap-3 bg-surface-container-low rounded-xl p-2.5">' +
        '<div class="w-10 h-10 rounded-lg bg-primary-container/15 flex items-center justify-center text-xl shrink-0">' + (c.emoji || "🍽️") + '</div>' +
        '<div class="flex-1 min-w-0"><p class="font-label-lg text-label-lg truncate">' + OL.escapeHtml(c.name) + '</p>' +
          '<p class="text-body-sm text-secondary">' + OL.money(c.price, r) + '</p></div>' +
        '<div class="flex items-center gap-2 bg-surface rounded-full border border-outline-variant px-1 py-1">' +
          '<button data-dec="' + c.id + '" class="w-7 h-7 rounded-full hover:bg-surface-container-high flex items-center justify-center"><span class="material-symbols-outlined text-[18px]">remove</span></button>' +
          '<span class="w-5 text-center font-label-lg">' + c.qty + '</span>' +
          '<button data-inc="' + c.id + '" class="w-7 h-7 rounded-full bg-primary text-on-primary flex items-center justify-center"><span class="material-symbols-outlined text-[18px]">add</span></button>' +
        '</div></div>';
    }).join("");

    document.getElementById("sumSubtotal").textContent = OL.money(t.subtotal, r);
    document.getElementById("sumFee").textContent = OL.money(t.fee, r);
    document.getElementById("sumTotal").textContent = OL.money(t.total, r);
    document.getElementById("feeRow").classList.toggle("hidden", orderType !== "delivery");

    // min order check
    var btn = document.getElementById("placeOrder");
    var minNote = document.getElementById("minNote");
    var belowMin = orderType === "delivery" && r.minOrder && t.subtotal < r.minOrder;
    if (belowMin) {
      minNote.classList.remove("hidden");
      minNote.textContent = "Minimum for delivery is " + OL.money(r.minOrder, r) + ".";
    } else { minNote.classList.add("hidden"); }
    btn.disabled = cart.length === 0 || belowMin;
  }

  document.getElementById("cartItems").addEventListener("click", function (e) {
    var inc = e.target.closest("[data-inc]"), dec = e.target.closest("[data-dec]");
    if (inc) changeQty(inc.getAttribute("data-inc"), 1);
    if (dec) changeQty(dec.getAttribute("data-dec"), -1);
  });

  // order type toggle
  function paintType() {
    document.querySelectorAll(".ol-type").forEach(function (b) {
      var on = b.getAttribute("data-type") === orderType;
      b.className = "ol-type px-3 py-2.5 rounded-xl border text-label-md flex flex-col items-center gap-1 " +
        (on ? "border-primary bg-primary-container/20 text-on-primary-container" : "border-outline-variant text-on-surface-variant");
    });
  }
  document.getElementById("typeToggle").addEventListener("click", function (e) {
    var b = e.target.closest("[data-type]"); if (!b) return;
    orderType = b.getAttribute("data-type"); paintType(); renderCart();
  });

  // ---- Place order ----
  document.getElementById("placeOrder").addEventListener("click", function () {
    if (!cart.length) return;
    var name = document.getElementById("custName").value.trim();
    if (!name) { ui.toast("Please add your name", { tone: "error" }); document.getElementById("custName").focus(); return; }
    try {
      var order = OL.placeOrder(slug, {
        items: cart,
        customer: { name: name, phone: document.getElementById("custPhone").value },
        type: orderType,
        table: table,
        note: document.getElementById("orderNote").value,
        channel: "online"
      });
      location.href = "order.html?id=" + encodeURIComponent(order.id);
    } catch (err) { ui.toast(err.message || "Could not place order", { tone: "error" }); }
  });

  // init
  paintType();
  renderCart();
})();
</script>
</body>
</html>
