<button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-lg text-label-lg whitespace-nowrap hover:bg-surface-container transition-all active:scale-95">Sides</button>
<button class="bg-surface-container-high text-on-surface px-4 py-2 rounded-full font-label-lg text-label-lg whitespace-nowrap hover:bg-surface-container transition-all active:scale-95">Beverages</button>

</div>
<div class="p-3">

<p class="text-[10px] text-secondary truncate">Angus, cheddar, sauce</p>
<div class="flex justify-between items-center mt-2">

</button>
</div>

<!-- Item Card 2 -->

<div class="h-32 bg-surface-container overflow-hidden">
<img alt="Truffle Fries" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQcmWAsNdNLYZZk7pK819Hh9lcdob39vwZlpi_E3sw5fGyKMoifXC4xbEZ8Y9vAnFA6ieujHqu0uO8qeRGwCMPxc2j5VCPKy2b3w_phwHa82ilvpoPiuf5TDdWVzE8MpofBJKn2xZ_7TrWam8HQIbYzRdSFmG-SSE3f2EKmjnBHE7nCyx0q9qkLch6GKT0FeLWlAVFYK6g1mil9CfJBzQQqeYmYEwNGxLX36kk6y0fhG8sNnweWn1LJWIt1nqL_te6e_YnoC_DpcU"/>
</div>
<div class="p-3">
<h3 class="font-label-lg text-label-lg font-bold text-on-surface truncate">Truffle Fries</h3>
<p class="text-[10px] text-secondary truncate">Parmesan, aioli</p>
<div class="flex justify-between items-center mt-2">
<p class="font-headline-sm text-headline-sm text-on-surface">$6.50</p>
<button class="bg-primary-container text-on-primary-container rounded-full p-2 active:scale-90 transition-transform" onclick="addToCart('Truffle Fries', 6.50)">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>

<!-- Item Card 3 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow">
<div class="h-32 bg-surface-container overflow-hidden">
<img alt="Grilled Chicken Sandwich" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAT8t8xJQPqL1zQYczVE0N4j6wDcJ1bD2F_BcnBzVHiOQ-BXvjaqZtL0jtIVvxLGNaB42zHjxKGJQEbw2IqEqZC0HzjKYwzVEhRJLnJwRqQFHN_YCuErVGhVdviqVPWPpnFaIWYcLtcRxHDVpqB3z7dpmWwHx_7wvqWJzPGp1HvXA6KQrqTyQiHZSL8nrqMW3G8p0fwbFIzQIu3-iIZ0u5m4UvbJDsYnLHvVBz4j2GVWmFE0ZW8PoRvxNXDKKmqYj4dxKXN0"/>
</div>
<div class="p-3">
<h3 class="font-label-lg text-label-lg font-bold text-on-surface truncate">Grilled Chicken</h3>
<p class="text-[10px] text-secondary truncate">Herb, bacon, lettuce</p>
<div class="flex justify-between items-center mt-2">
<p class="font-headline-sm text-headline-sm text-on-surface">$11</p>
<button class="bg-primary-container text-on-primary-container rounded-full p-2 active:scale-90 transition-transform" onclick="addToCart('Grilled Chicken', 11)">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>

<!-- Item Card 4 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden shadow-sm hover:shadow-md transition-shadow">
<div class="h-32 bg-surface-container overflow-hidden">
<img alt="Iced Tea" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEq8f1eaPxDjfM8Y_nqJqf-A6_6xKSDqyPfXXLo0nWFaW7kSbGl7m94RLZR_sYJfWQm2r_WgKvLjfpwwfjPD3gGhp1JAX91vQpCR3XhEDAkNW51Pqv6NXIV7KjQFg6qJhNnwPRlUBGBVY6FDJqyxUCdUhxRUqQhg5E_BdI5HvfqNmXQRMIwWdahKVTKKhm_l2i6InX6C3xgQwXlqKvF4zXmH7aQwcFQXI5q-6VJhSbXmlxyxwvFSb6Q3GHTFP3KeUO5InxW6"/>
</div>
<div class="p-3">
<h3 class="font-label-lg text-label-lg font-bold text-on-surface truncate">Iced Tea</h3>
<p class="text-[10px] text-secondary truncate">Lemon, sugar</p>
<div class="flex justify-between items-center mt-2">
<p class="font-headline-sm text-headline-sm text-on-surface">$3</p>
<button class="bg-primary-container text-on-primary-container rounded-full p-2 active:scale-90 transition-transform" onclick="addToCart('Iced Tea', 3)">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>

</main>

<!-- Fixed Cart Drawer -->
<div class="cart-drawer" id="cartDrawer">
<div class="bg-surface rounded-t-3xl shadow-lg max-h-screen overflow-y-auto">
<div class="sticky top-0 bg-surface border-b border-outline-variant px-4 py-4 flex items-center justify-between">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Your Order</h2>
<button class="text-on-surface-variant hover:text-on-surface" onclick="toggleCart()">
<span class="material-symbols-outlined">close</span>
</button>
</div>

<div class="px-4 py-4 space-y-3" id="cartItems">
<!-- Items populated by JS -->
</div>

<div class="px-4 py-4 border-t border-outline-variant space-y-3">
<div class="flex justify-between text-body-md">
<span class="text-secondary">Subtotal</span>
<span class="font-bold" id="subtotal">$0.00</span>
</div>
<div class="flex justify-between text-body-md">
<span class="text-secondary">Delivery</span>
<span class="font-bold">$2.50</span>
</div>
<div class="flex justify-between text-headline-sm font-bold border-t border-outline-variant pt-3">
<span>Total</span>
<span id="total">$2.50</span>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-lg text-label-lg py-3 rounded-full hover:shadow-lg transition-all active:scale-95">Order on WhatsApp</button>
</div>
</div>
</div>

<!-- Floating Cart Button -->
<button class="fixed bottom-6 left-1/2 -translate-x-1/2 z-30 w-12 h-12 rounded-full bg-primary text-on-primary shadow-lg hover:shadow-xl active:scale-90 transition-all flex items-center justify-center" onclick="toggleCart()">
<span class="material-symbols-outlined text-[24px] relative">
shopping_cart
<span class="absolute -top-1 -right-1 bg-error text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold" id="cartBadge">0</span>
</span>
</button>

<script>
const cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCartUI();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCartUI();
}

function updateCartUI() {
  const badge = document.getElementById('cartBadge');
  const subtotal = document.getElementById('subtotal');
  const total = document.getElementById('total');
  const cartItems = document.getElementById('cartItems');
  
  badge.textContent = cart.length;
  
  const sum = cart.reduce((acc, item) => acc + item.price, 0);
  subtotal.textContent = `$${sum.toFixed(2)}`;
  total.textContent = `$${(sum + 2.50).toFixed(2)}`;
  
  cartItems.innerHTML = cart.map((item, i) => `
    <div class="flex justify-between items-center bg-surface-container-low p-3 rounded-lg">
      <span class="font-body-md text-on-surface">${item.name}</span>
      <div class="flex items-center gap-2">
        <span class="font-bold text-primary">$${item.price.toFixed(2)}</span>
        <button class="text-error hover:bg-error/10 p-1 rounded" onclick="removeFromCart(${i})">
          <span class="material-symbols-outlined text-[18px]">delete</span>
        </button>
      </div>
    </div>
  `).join('');
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('active');
}
</script>
</body>
</html>
